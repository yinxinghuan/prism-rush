<!doctype html>
<html lang="en">
  <head>
    <meta name="game-uuid" content="5f0e5da5-c7f1-4606-97f7-6d907585728b" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/gif" href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" />
    <title>Prism Rush</title>
      <script src="https://images.aiwaves.tech/alteru/guest-shell.js" defer></script>
</head>
  <body>
    <div id="app" class="pr-shell">
      <div id="stage" class="pr-stage" aria-hidden="true"></div>
      <div class="pr-vignette" aria-hidden="true"></div>

      <header id="hud" class="pr-hud">
        <div class="pr-hud__cell">
          <span data-i18n="time">Time</span>
          <strong id="timeLeft">60</strong>
        </div>
        <div class="pr-hud__cell pr-hud__cell--right">
          <span data-i18n="score">Score</span>
          <strong id="scoreValue">0</strong>
        </div>
      </header>

      <div id="popLayer" class="pr-pop-layer" aria-hidden="true"></div>
      <div id="ratingPop" class="pr-rating" aria-hidden="true"></div>
      <div id="comboBadge" class="pr-combo" aria-hidden="true">x2</div>
      <button id="shopButton" class="pr-shop-button" type="button" aria-label="Open character shop" data-i18n="shop">Characters</button>
      <button id="championPill" class="pr-champion" type="button" aria-label="Open leaderboard">
        <span id="championAvatar" class="pr-champion__avatar" aria-hidden>★</span>
        <span class="pr-champion__body">
          <span id="championName" class="pr-champion__name" data-i18n="leaders">Leaders</span>
          <span id="championScore" class="pr-champion__score"></span>
        </span>
      </button>

      <div id="startGuide" class="pr-start-guide is-visible" aria-hidden="true">
        <div class="pr-start-guide__finger">
          <span class="pr-start-guide__ripple"></span>
          <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.92-1.38z"/></svg>
        </div>
        <p class="pr-start-guide__label" data-i18n="startHint">Tap left or right</p>
      </div>

      <main id="startScreen" class="pr-screen pr-screen--start is-active"></main>

      <main id="gameScreen" class="pr-screen pr-screen--game">
        <div id="laneCue" class="pr-lane-cue" aria-hidden="true">
          <span>‹</span>
          <span>›</span>
        </div>
      </main>

      <main id="endScreen" class="pr-screen pr-screen--end">
        <section class="pr-panel pr-panel--end">
          <p id="resultLabel" class="pr-kicker">Tunnel clear</p>
          <h2 id="finalScore">0</h2>
          <div class="pr-stats">
            <div class="pr-stats__item">
              <span data-i18n="best">Best</span>
              <strong id="bestScore">0</strong>
            </div>
            <div class="pr-stats__item">
              <span data-i18n="maxCombo">Max Combo</span>
              <strong id="maxComboValue">0</strong>
            </div>
          </div>
          <div class="pr-actions">
            <button id="rankButton" class="pr-button" type="button" data-i18n="leaderboard">Leaderboard</button>
            <button id="againButton" class="pr-button pr-button--primary" type="button" data-i18n="again">Again</button>
            <button id="homeButton" class="pr-button" type="button" data-i18n="home">Home</button>
          </div>
        </section>
      </main>

      <section id="leaderboardOverlay" class="pr-lb" aria-hidden="true">
        <div class="pr-lb__card" role="dialog" aria-modal="true" aria-labelledby="leaderboardTitle">
          <button id="leaderboardClose" class="pr-lb__close" type="button" aria-label="Close">×</button>
          <p class="pr-kicker" data-i18n="leaderboardKicker">Global rank</p>
          <h2 id="leaderboardTitle" class="pr-lb__title" data-i18n="leaderboardTitle">Prism Leaders</h2>
          <div id="leaderboardList" class="pr-lb__list"></div>
        </div>
      </section>

      <section id="shopOverlay" class="pr-shop" aria-hidden="true">
        <div class="pr-shop__card" role="dialog" aria-modal="true" aria-labelledby="shopTitle">
          <button id="shopClose" class="pr-shop__close" type="button" aria-label="Close">×</button>
          <div class="pr-shop__head">
            <p class="pr-kicker" data-i18n="shopKicker">Roster</p>
            <h2 id="shopTitle" class="pr-shop__title" data-i18n="shopTitle">Character Shop</h2>
            <p class="pr-shop__subtitle" data-i18n="shopSubtitle">Unlock with Prism. Random rolls from owned.</p>
          </div>
          <div class="pr-shop__balance">
            <span data-i18n="prisms">Prism</span>
            <strong id="shopBalance">0</strong>
          </div>
          <div id="shopGrid" class="pr-shop__grid"></div>
        </div>
      </section>

      <img class="pr-watermark" src="./img/aigram.svg" alt="" draggable="false" />
    </div>
    <script src="./aigram-bridge.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
