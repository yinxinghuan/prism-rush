<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Prism Rush poster">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.48" stop-color="#142c4c"/>
      <stop offset="1" stop-color="#050912"/>
    </linearGradient>
    <linearGradient id="track" x1="0" x2="1">
      <stop offset="0" stop-color="#72f8ff"/>
      <stop offset="0.52" stop-color="#bc7cff"/>
      <stop offset="1" stop-color="#ff8ad8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g fill="none" stroke="url(#track)" stroke-linecap="round" filter="url(#glow)">
    <path d="M150 780 470 145" stroke-width="8" opacity=".82"/>
    <path d="M1050 780 730 145" stroke-width="8" opacity=".82"/>
    <path d="M350 790 540 140" stroke-width="5" opacity=".62"/>
    <path d="M850 790 660 140" stroke-width="5" opacity=".62"/>
    <path d="M245 600 C390 520 810 520 955 600" stroke-width="7" opacity=".72"/>
    <path d="M315 450 C430 390 770 390 885 450" stroke-width="6" opacity=".62"/>
    <path d="M385 320 C470 280 730 280 815 320" stroke-width="5" opacity=".52"/>
  </g>
  <g transform="translate(600 545)" filter="url(#glow)">
    <path d="M0-132 118-38 72 112-72 112-118-38Z" fill="#fff7aa"/>
    <path d="M0-132 118-38 0 12Z" fill="#72f8ff" opacity=".88"/>
    <path d="M0 12 72 112-72 112Z" fill="#ff8ad8" opacity=".92"/>
    <path d="M0-132-118-38 0 12Z" fill="#bc7cff" opacity=".9"/>
    <path d="M0-132 118-38 72 112-72 112-118-38Z" fill="none" stroke="#ffffff" stroke-width="8" opacity=".84"/>
  </g>
  <g fill="#ff3f5f" filter="url(#glow)" opacity=".88">
    <rect x="210" y="250" width="32" height="190" rx="8"/>
    <rect x="958" y="250" width="32" height="190" rx="8"/>
    <rect x="210" y="250" width="780" height="28" rx="8"/>
  </g>
  <text x="600" y="145" text-anchor="middle" fill="#f7fbff" font-family="Inter,Arial,sans-serif" font-size="88" font-weight="900">Prism Rush</text>
  <text x="600" y="214" text-anchor="middle" fill="#72f8ff" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="700">3D light tunnel</text>
</svg>
